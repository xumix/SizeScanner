stages:
  - build
  - publish

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  Configuration: Release

cache:
  key:
    files:
      - Directory.Packages.props
      - global.json
  paths:
    - .nuget/packages

build:
  stage: build
  tags:
    - windows
  script:
    - dotnet restore SizeScanner.slnx
    - dotnet build SizeScanner.slnx -c $Configuration --no-restore
    - dotnet test ScannerCore.Tests/ScannerCore.Tests.csproj -c $Configuration --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory TestResults

  artifacts:
    when: always
    paths:
      - TestResults/
    expire_in: 7 days

publish:
  stage: publish
  tags:
    - windows
  needs: [build]
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    GIT_DEPTH: "0"
  script:
    - dotnet publish ScannerUiWinForms/ScannerUiWinForms.csproj -c $Configuration -r win-x64 --self-contained true -o publish/
  artifacts:
    paths:
      - publish/
    expire_in: 30 days
