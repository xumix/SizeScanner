# Release workflow aligned with the official .NET Core Desktop template setup.
# Publishes a self-contained win-x64 build on version tags (no WAP/MSIX packaging).

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
      Solution_Name: SizeScanner.slnx
      App_Project_Path: SizeScanner.Avalonia/SizeScanner.Avalonia.csproj
      Configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2

      - name: Restore the application
        run: dotnet restore $env:Solution_Name -r win-x64

      - name: Publish the application
        run: >
          dotnet publish $env:App_Project_Path
          -c $env:Configuration
          -r win-x64
          --self-contained true
          --no-restore
          -o publish/

      - name: Package
        run: Compress-Archive -Path publish/* -DestinationPath SizeScanner-win-x64.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SizeScanner-win-x64
          path: publish/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: SizeScanner-win-x64.zip
          generate_release_notes: true
